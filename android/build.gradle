buildscript {
    ext.kotlin_version = '1.9.0' // Make sure this is correctly set
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath 'com.android.tools.build:gradle:8.3.1'
        classpath 'com.android.tools.build:gradle:7.2.2' // Ensure you have the correct version
        classpath 'com.google.gms:google-services:4.3.15'
        // Other classpath dependencies
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
